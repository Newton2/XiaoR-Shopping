name: Build XiaoR-Shopping

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Configure git longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "=== Repo files ==="
          Get-ChildItem -Recurse -Name | Where-Object { $_ -notlike "*node_modules*" }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Show package.json build config
        run: type package.json

      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64 --publish never
        env:
          DEBUG: electron-builder

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: XiaoR-Shopping-Windows
          path: dist/*.exe
          retention-days: 30
