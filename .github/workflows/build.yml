name: Build XiaoR-Shopping

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Configure git longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Rename installer
        run: |
          $file = Get-ChildItem -Path dist -Filter "*.exe" | Where-Object { $_.Name -like "*Setup*" } | Select-Object -First 1
          if ($file) {
            $dest = Join-Path (Get-Location) "dist\XiaoR-Shopping-Setup.exe"
            Rename-Item -Path $file.FullName -NewName "XiaoR-Shopping-Setup.exe"
            echo "Renamed to XiaoR-Shopping-Setup.exe"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: XiaoR-Shopping-Windows
          path: dist/XiaoR-Shopping-Setup.exe
          if-no-files-found: error
